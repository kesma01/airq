<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kakovost zraka v Sloveniji</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" data-cfasync="false"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" data-cfasync="false"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" data-cfasync="false"></script>

  <link rel="stylesheet" href="/static/css/style.css?v=6" />
</head>
<body>

  <div id="header">
    <div id="header-left">
      <span id="title">Kakovost zraka v Sloveniji</span>
      <span id="subtitle">ARSO · Sensor.Community · OpenSenseMap · PurpleAir · AQICN</span>
    </div>

    <div id="legend">
      <span class="leg" style="--c:#009966"><span>Zelo dobro</span></span>
      <span class="leg" style="--c:#33CC33"><span>Dobro</span></span>
      <span class="leg" style="--c:#F0D800"><span>Srednje</span></span>
      <span class="leg" style="--c:#FF9900"><span>Slabo</span></span>
      <span class="leg" style="--c:#CC3300"><span>Zelo slabo</span></span>
      <span class="leg" style="--c:#820000"><span>Izjemno slabo</span></span>
      <span class="leg" style="--c:#aaaaaa"><span>Ni podatkov</span></span>
    </div>

    <div id="header-right">
      <button class="icon-btn" id="btn-theme" onclick="toggleTheme()">🌙 Temno</button>
      <button class="icon-btn" id="btn-lang"  onclick="toggleLang()">EN</button>
    </div>
  </div>

  <!-- map-wrap: position:relative container; #map fills it; overlays sit beside it -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- Status bar -->
    <div id="statusbar">–</div>

    <!-- Station panel -->
    <div id="panel" class="panel hidden">
      <button id="panel-close" onclick="closePanel()">✕</button>
      <div id="panel-content"></div>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Nalaganje postaj…</div>
    </div>
  </div>

  <script src="/static/js/map.js?v=6" data-cfasync="false"></script>
</body>
</html>
