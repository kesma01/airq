<!DOCTYPE html>
<html lang="sl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kakovost zraka v Sloveniji</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.5.3/dist/MarkerCluster.Default.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" data-cfasync="false"></script>
  <script src="https://unpkg.com/leaflet.markercluster@1.5.3/dist/leaflet.markercluster.js" data-cfasync="false"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.2/dist/chart.umd.min.js" data-cfasync="false"></script>

  <link rel="stylesheet" href="/static/css/style.css?v=14" />
</head>
<body>

  <div id="header">
    <div id="header-middle">
      <span id="title">Kakovost zraka v Sloveniji</span>
      <span id="subtitle">ARSO · Sensor.Community · OpenSenseMap · PurpleAir · AQICN · OpenAQ</span>
    </div>
    <div id="legend">
      <span class="leg" style="--c:#009966"><span>Zelo dobro</span></span>
      <span class="leg" style="--c:#33CC33"><span>Dobro</span></span>
      <span class="leg" style="--c:#F0D800"><span>Srednje</span></span>
      <span class="leg" style="--c:#FF9900"><span>Slabo</span></span>
      <span class="leg" style="--c:#CC3300"><span>Zelo slabo</span></span>
      <span class="leg" style="--c:#820000"><span>Izjemno slabo</span></span>
      <span class="leg" style="--c:#aaaaaa"><span>Ni podatkov</span></span>
    </div>
    <div id="header-top">
      <div id="header-right">
        <button class="icon-btn" id="btn-cams"  onclick="toggleCams()">🌫️ Model</button>
        <button class="icon-btn" id="btn-theme" onclick="toggleTheme()">🌙 Temno</button>
        <button class="icon-btn" id="btn-lang"  onclick="toggleLang()">EN</button>
        <a class="icon-btn icon-link" href="https://github.com/kesma01/airq" target="_blank" rel="noopener" title="GitHub">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true">
            <path d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
          </svg>
        </a>
        <a class="icon-btn icon-link" href="https://bsky.app/profile/kesma.wtf" target="_blank" rel="noopener" title="Bluesky @kesma.wtf">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 10.8c-1.087-2.114-4.046-6.053-6.798-7.995C2.566.944 1.561 1.266.902 1.565.139 1.908 0 3.08 0 3.768c0 .69.378 5.65.624 6.479.815 2.736 3.713 3.66 6.383 3.364.136-.02.275-.039.415-.056-.138.022-.276.04-.415.056-3.912.58-7.387 2.005-2.83 7.078 5.013 5.19 6.87-1.113 7.823-4.308.953 3.195 2.05 9.271 7.733 4.308 4.267-4.308 1.172-6.498-2.74-7.078a8.741 8.741 0 01-.415-.056c.14.017.279.036.415.056 2.67.297 5.568-.628 6.383-3.364.246-.828.624-5.79.624-6.478 0-.69-.139-1.861-.902-2.204-.659-.299-1.664-.62-4.3 1.24C16.046 4.748 13.087 8.687 12 10.8z"/>
          </svg>
        </a>
      </div>
    </div>
  </div>

  <!-- map-wrap: position:relative container; #map fills it; overlays sit beside it -->
  <div id="map-wrap">
    <div id="map"></div>

    <!-- Status bar -->
    <div id="statusbar">–</div>

    <!-- Station panel -->
    <div id="panel" class="panel hidden">
      <button id="panel-close" onclick="closePanel()">✕</button>
      <div id="panel-content"></div>
    </div>

    <!-- Loading -->
    <div id="loading">
      <div class="spinner"></div>
      <div id="loading-text">Nalaganje postaj…</div>
    </div>
  </div>

  <script src="/static/js/map.js?v=12" data-cfasync="false"></script>
</body>
</html>
